                    - generic [ref=e645]:
                      - code [ref=e647]: "# 1.确保当前目录是NotionNext代码文件夹 cd NotionNext # 2.创建构建文件 cat > Dockerfile <<EOF # 第一阶段：基础镜像 FROM swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/node:20-alpine AS base # 第二阶段：依赖安装 FROM base AS deps # 声明阶段参数（推荐方式） ARG NOTION_PAGE_ID ARG NEXT_PUBLIC_THEME # 安装依赖 RUN apk add --no-cache libc6-compat WORKDIR /app COPY package.json ./ RUN yarn config set registry https://registry.npmmirror.com && \\ yarn config set disturl https://npmmirror.com/dist && \\ yarn install --frozen-lockfile --network-timeout 600000 # 第三阶段：构建 FROM base AS builder ARG NOTION_PAGE_ID ARG NEXT_PUBLIC_THEME ENV NEXT_BUILD_STANDALONE=true ENV NEXT_DEBUG=${NEXT_DEBUG:-false} WORKDIR /app COPY --from=deps /app/node_modules ./node_modules COPY . . RUN yarn build # 第四阶段：运行 FROM base AS runner ENV NODE_ENV=production WORKDIR /app COPY --from=builder /app/public ./public # Automatically leverage output traces to reduce image size # https://nextjs.org/docs/advanced-features/output-file-tracing COPY --from=builder /app/.next/standalone ./ COPY --from=builder /app/.next/static ./.next/static # 个人仓库把将配置好的.env.local文件放到项目根目录，可自动使用环境变量 # COPY --from=builder /app/.env.local ./ EXPOSE 3000 # Next.js collects completely anonymous telemetry data about general usage. # Learn more here: https://nextjs.org/telemetry # Uncomment the following line in case you want to disable telemetry. # ENV NEXT_TELEMETRY_DISABLED 1 CMD [\"node\", \"server.js\"] EOF"
                      - generic [ref=e648]:
                        - generic [ref=e649]: Bash
                        - button "Copy" [ref=e651] [cursor=pointer]
