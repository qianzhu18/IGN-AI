                      - /url: "#c70501c1b8754a1b8de4c814c4bd463d"
                      - img [ref=e814]
                    - text: 为什么用这种多数据库的方案实现？
                - generic [ref=e816]: 考虑到网站中所有的按钮菜单、提示语和文章内容都要设置不同语言的版本，有两种方案：
                - list [ref=e817]:
                  - listitem [ref=e818]:
                    - text: 通过在数据库添加字段区分语言的方案，例如为一条数据打上标签
                    - code [ref=e819]: English
                - list [ref=e820]:
                  - listitem [ref=e821]: 允许一个站点绑定多个数据库，即多数据源方案。
                - generic [ref=e822]: 方案一，势必会导致单个Notion数据库模板的庞大复杂，从而难以维护。
                - generic [ref=e823]: 我决定使用“多数据源”的方案， 即一个NotionNext网站支持绑定多个Notion数据库，根据用户的语言地区或者所选语言自动切换展示对应数据库的内容。这样的好处有：
                - list [ref=e824]:
                  - listitem [ref=e825]: 差异化运营：针对不同人群，显示的菜单数量和内容、文章内容和数量都可完全不同的，便于不同地区定制化运营。
                - list [ref=e826]:
                  - listitem [ref=e827]: 各数据库独立，使单个数据库的内容更少更易于维护，并且不会在原来的数据库中新增一个”语言”字段，对于不需要多语言的用户来说体验更加无缝。
                - list [ref=e828]:
                  - listitem [ref=e829]:
                    - text: 此方案理论上，允许一个站点配置无数种语言。从而使网站有了更强的扩展性，一个站点可以接入多套数据带来更多可能性。多语言的路径除了
                    - code [ref=e830]: /en/article/test.html
                    - text: 、
                    - code [ref=e831]: /zh
                    - text: 、
                    - code [ref=e832]: /jp
                    - text: 这类语言前缀，也可以是其它丰富的格式，甚至可以借此开发出多个子板块，每个板块定制不同的主题、配置、功能等等。当然，你也可以多建几个二级域名的网站。
